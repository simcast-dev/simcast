<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF3FF"/>
      <stop offset="100%" stop-color="#E2EAFF"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5E8AF7"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <radialGradient id="shineGrad" cx="30%" cy="18%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgVignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#DDEAFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8DAFF" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="shieldShadow" x="-25%" y="-20%" width="150%" height="165%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1D4ED8" flood-opacity="0.28"/>
    </filter>
    <pattern id="dotGrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#3B82F6" opacity="0.11"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="460" height="280" fill="url(#bgGrad)"/>
  <!-- Vignette -->
  <rect width="460" height="280" fill="url(#bgVignette)"/>
  <!-- Dot grid -->
  <rect width="460" height="280" fill="url(#dotGrid)"/>

  <!-- Concentric rings radiating from shield center (230, 142) -->
  <circle cx="230" cy="142" r="78"  fill="none" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.10"/>
  <circle cx="230" cy="142" r="118" fill="none" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.07"/>
  <circle cx="230" cy="142" r="162" fill="none" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.055"/>
  <circle cx="230" cy="142" r="212" fill="none" stroke="#3B82F6" stroke-width="0.4" stroke-opacity="0.04"/>

  <!-- Shield shape centered at (230, 142) -->
  <!-- Top corners at (193, 60) and (267, 60), bottom point at (230, 228) -->
  <path d="M 198 62 Q 193 62 193 68 L 193 158 Q 193 200 230 224 Q 267 200 267 158 L 267 68 Q 267 62 262 62 Z"
        fill="url(#shieldGrad)" filter="url(#shieldShadow)"/>
  <!-- Shine overlay -->
  <path d="M 198 62 Q 193 62 193 68 L 193 158 Q 193 200 230 224 Q 267 200 267 158 L 267 68 Q 267 62 262 62 Z"
        fill="url(#shineGrad)"/>

  <!-- Monitor / screen icon (white) inside shield -->
  <!-- Screen body -->
  <rect x="204" y="82" width="52" height="40" rx="3.5" fill="white" opacity="0.96"/>
  <!-- Screen inner display area -->
  <rect x="208" y="86" width="44" height="30" rx="2" fill="#1D4ED8" opacity="0.82"/>
  <!-- Content lines on screen -->
  <line x1="213" y1="93"  x2="247" y2="93"  stroke="white" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="213" y1="99"  x2="242" y2="99"  stroke="white" stroke-width="1.4" stroke-opacity="0.32" stroke-linecap="round"/>
  <line x1="213" y1="105" x2="237" y2="105" stroke="white" stroke-width="1.4" stroke-opacity="0.28" stroke-linecap="round"/>
  <!-- Screen recording dot (top-right of screen, macOS-style) -->
  <circle cx="246" cy="88.5" r="2.8" fill="#EF4444" opacity="0.92"/>
  <circle cx="246" cy="88.5" r="5"   fill="#EF4444" fill-opacity="0.18"/>
  <!-- Monitor stand -->
  <rect x="222" y="122" width="16" height="8" rx="1" fill="white" opacity="0.9"/>
  <!-- Monitor base -->
  <rect x="215" y="130" width="30" height="3.5" rx="1.75" fill="white" opacity="0.9"/>

  <!-- Lock body (open lock = granted) below monitor -->
  <!-- Lock shackle: open arc top-left of lock body -->
  <path d="M 222 155 L 222 148 Q 222 143 227 143 L 230 143"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.88"/>
  <!-- Lock body -->
  <rect x="222" y="155" width="18" height="14" rx="3" fill="white" opacity="0.88"/>
  <!-- Keyhole -->
  <circle cx="231" cy="161" r="2.5" fill="#1D4ED8" opacity="0.8"/>
  <rect x="230" y="161" width="2" height="4" rx="1" fill="#1D4ED8" opacity="0.8"/>

  <!-- Checkmark badge (permission granted) -->
  <circle cx="258" cy="198" r="13" fill="white"/>
  <circle cx="258" cy="198" r="11" fill="#22C55E"/>
  <path d="M 252 198 L 256 202 L 264 193"
        fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small label hint below shield -->
  <text x="230" y="246" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#3B82F6" opacity="0.5" letter-spacing="0.5">SCREEN RECORDING</text>
</svg>
